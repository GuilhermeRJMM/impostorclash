<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clash Impostor</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            padding: 20px;
            background: #1a252f;
            color: white;
            margin: 0;
        }

        .card {
            background: #2c3e50;
            padding: 30px;
            border-radius: 10px;
            margin: 20px auto;
            max-width: 500px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
        }

        button {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            background: #e74c3c;
            border: none;
            color: white;
            border-radius: 5px;
            margin: 5px;
            transition: 0.3s;
            width: 100%;
            max-width: 300px;
        }

        button:hover {
            background: #c0392b;
        }

        input {
            padding: 12px;
            font-size: 16px;
            border-radius: 5px;
            border: none;
            margin-bottom: 15px;
            width: 100%;
            max-width: 280px;
            text-align: center;
        }

        hr {
            border-color: #34495e;
            margin: 20px 0;
        }

        .voto-btn {
            background: #3498db;
            margin-bottom: 10px;
        }

        .voto-btn:hover {
            background: #2980b9;
        }

        .tela {
            display: none;
        }

        /* Todas as telas começam invisíveis */
    </style>
</head>

<body>

    <h1>🕵️ Clash Impostor</h1>

    <div id="tela-login" class="tela card" style="display: block;">
        <h2>Entrar na Partida</h2>
        <input type="text" id="nomeInput" placeholder="Digite seu Nickname">
        <br>
        <button onclick="entrar()">Conectar</button>
        <p id="status-login" style="color: #bdc3c7; margin-top: 15px;">Aguardando conexão com servidor...</p>
    </div>

    <div id="tela-espera" class="tela card">
        <h2 style="color: #3498db;">Sala de Espera</h2>
        <h1 id="contador-jogadores">0/4</h1>
        <p>Aguardando mais jogadores para iniciar...</p>
    </div>

    <div id="tela-jogo" class="tela card">
        <h2 style="margin-top: 0; color: #ecf0f1;">Seu Papel:</h2>
        <h2 id="meuPapel" style="background: #1abc9c; padding: 15px; border-radius: 8px;"></h2>
        <hr>
        <h3>Ordem de Fala:</h3>
        <ol id="ordemLista" style="text-align: left; display: inline-block; font-size: 18px;"></ol>
        <hr>
        <button onclick="solicitarVotacao()">🚨 Iniciar Votação</button>
    </div>

    <div id="tela-votacao" class="tela card">
        <h2>Quem é o Impostor?</h2>
        <p>Clique no jogador que você quer expulsar:</p>
        <div id="listaBotoesVoto"></div>
        <p id="statusVoto" style="color: #f1c40f; display: none;">Voto registrado! Aguardando os outros...</p>
    </div>

    <div id="tela-resultado" class="tela card">
        <h2>FIM DE JOGO</h2>
        <h3 id="textoResultado" style="line-height: 1.5;"></h3>
        <button onclick="location.reload()" style="background: #2ecc71;">Voltar ao Início</button>
    </div>

    <script>
        const socket = io();

        // Gerenciador mestre de telas (Impede bugs visuais)
        function mostrarTela(idTelaAtiva) {
            const telas = ['tela-login', 'tela-espera', 'tela-jogo', 'tela-votacao', 'tela-resultado'];
            telas.forEach(tela => {
                document.getElementById(tela).style.display = (tela === idTelaAtiva) ? 'block' : 'none';
            });
        }

        // --- AÇÕES DO USUÁRIO ---
        function entrar() {
            const nome = document.getElementById('nomeInput').value.trim();
            if (!nome) return alert("Por favor, digite um nome válido!");
            socket.emit('entrarJogo', nome);
            mostrarTela('tela-espera'); // Vai pra tela de espera imediatamente
        }

        function solicitarVotacao() {
            if (confirm("Deseja interromper a discussão e iniciar a votação?")) {
                socket.emit('pedirVotacao');
            }
        }

        function votar(idVotado) {
            socket.emit('enviarVoto', idVotado);
            document.getElementById('listaBotoesVoto').style.display = 'none';
            document.getElementById('statusVoto').style.display = 'block';
        }

        // --- RESPOSTAS DO SERVIDOR ---
        socket.on('atualizarJogadores', (jogadores) => {
            document.getElementById('contador-jogadores').innerText = `${jogadores.length}/4`;
            document.getElementById('status-login').innerText = `Status: ${jogadores.length}/4 na sala.`;
        });

        socket.on('jogoIniciado', (dados) => {
            mostrarTela('tela-jogo');

            const displayPapel = document.getElementById('meuPapel');
            if (dados.papel.tipo === 'Impostor') {
                displayPapel.innerText = `IMPOSTOR 🔪\n\nDica: ${dados.papel.dica}`;
                displayPapel.style.background = '#c0392b';
            } else {
                displayPapel.innerText = `INOCENTE 🛡️\n\nCarta: ${dados.papel.carta}`;
                displayPapel.style.background = '#2980b9';
            }

            const lista = document.getElementById('ordemLista');
            lista.innerHTML = '';
            dados.ordemFalas.forEach(nome => {
                const li = document.createElement('li');
                li.innerText = nome;
                lista.appendChild(li);
            });
        });

        socket.on('abrirTelaVotacao', (jogadores) => {
            mostrarTela('tela-votacao');
            document.getElementById('statusVoto').style.display = 'none'; // Reseta o aviso de voto
            document.getElementById('listaBotoesVoto').style.display = 'block';

            const divBotoes = document.getElementById('listaBotoesVoto');
            divBotoes.innerHTML = '';

            jogadores.forEach(j => {
                const btn = document.createElement('button');
                btn.className = 'voto-btn';
                btn.innerText = `Votar em ${j.nome}`;
                btn.onclick = () => votar(j.id);
                divBotoes.appendChild(btn);
            });
        });

        socket.on('resultadoFinal', (mensagem) => {
            mostrarTela('tela-resultado');
            document.getElementById('textoResultado').innerText = mensagem;
        });

        socket.on('erro', (msg) => {
            alert(msg);
            mostrarTela('tela-login'); // Se der erro, volta pro inicio
        });

        // Tratamento de desconexão (Internet caiu)
        socket.on('disconnect', () => {
            alert("A conexão com o servidor caiu. A página será atualizada.");
            location.reload();
        });
    </script>
</body>

</html>
