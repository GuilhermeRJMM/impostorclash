<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clash Impostor</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body {
            font-family: sans-serif;
            text-align: center;
            background: #1a252f;
            color: white;
            margin: 0;
            padding: 20px;
        }

        .card {
            background: #2c3e50;
            padding: 20px;
            border-radius: 10px;
            max-width: 400px;
            margin: 20px auto;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
        }

        .tela {
            display: none;
        }

        button {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            background: #e74c3c;
            color: white;
        }

        input {
            width: 90%;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 5px;
            border: none;
            text-align: center;
        }

        .inocente {
            background: #2980b9 !important;
        }

        .impostor {
            background: #c0392b !important;
        }
    </style>
</head>

<body>

    <h1>🕵️ Jogo do Impostor</h1>

    <div id="tela-login" class="tela" style="display: block;">
        <div class="card">
            <input type="text" id="nomeInput" placeholder="Seu Nome">
            <button onclick="entrar()">ENTRAR NO JOGO</button>
            <p id="L-status">Conectando...</p>
        </div>
    </div>

    <div id="tela-espera" class="tela">
        <div class="card">
            <h2>Aguardando Jogadores</h2>
            <h1 id="contador">0/4</h1>
            <p>O jogo começará automaticamente com 4 pessoas.</p>
        </div>
    </div>

    <div id="tela-jogo" class="tela">
        <div class="card">
            <h2 id="papel-titulo">SEU PAPEL</h2>
            <div id="caixa-papel" style="padding: 20px; border-radius: 10px; font-size: 24px; font-weight: bold;"></div>
            <p id="dica-area" style="margin-top: 15px; color: #f1c40f;"></p>
            <hr>
            <h3>Ordem de Fala:</h3>
            <div id="lista-ordem" style="text-align: left; background: rgba(0,0,0,0.2); padding: 10px;"></div>
            <button onclick="socket.emit('pedirVotacao')">🚨 VOTAR AGORA</button>
        </div>
    </div>

    <div id="tela-votacao" class="tela">
        <div class="card">
            <h2>VOTAÇÃO</h2>
            <div id="botoes-voto"></div>
        </div>
    </div>

    <div id="tela-fim" class="tela">
        <div class="card">
            <h2 id="msg-final"></h2>
            <button onclick="location.reload()">JOGAR NOVAMENTE</button>
        </div>
    </div>

    <script>
        const socket = io();

        function mostrarTela(id) {
            document.querySelectorAll('.tela').forEach(t => t.style.display = 'none');
            document.getElementById(id).style.display = 'block';
        }

        function entrar() {
            const n = document.getElementById('nomeInput').value;
            if (!n) return alert("Digite seu nome!");
            socket.emit('entrarJogo', n);
            mostrarTela('tela-espera');
        }

        socket.on('atualizarJogadores', (jogadores) => {
            document.getElementById('contador').innerText = `${jogadores.length}/4`;
            document.getElementById('L-status').innerText = `Jogadores online: ${jogadores.length}`;
        });

        socket.on('jogoIniciado', (data) => {
            mostrarTela('tela-jogo');
            const caixa = document.getElementById('caixa-papel');
            const dicaArea = document.getElementById('dica-area');

            if (data.papel.tipo === 'Impostor') {
                caixa.innerText = "VOCÊ É O IMPOSTOR!";
                caixa.className = 'impostor';
                dicaArea.innerText = "Dica: " + data.papel.dica;
            } else {
                caixa.innerText = "CARTA: " + data.papel.carta;
                caixa.className = 'inocente';
                dicaArea.innerText = "Você é Inocente. Tente não ser descoberto!";
            }

            document.getElementById('lista-ordem').innerHTML = data.ordemFalas.map((n, i) => `<p>${i + 1}. ${n}</p>`).join('');
        });

        socket.on('abrirTelaVotacao', (jogs) => {
            mostrarTela('tela-votacao');
            const area = document.getElementById('botoes-voto');
            area.innerHTML = jogs.map(j => `<button onclick="socket.emit('enviarVoto','${j.id}'); this.disabled=true; this.innerText='VOTO ENVIADO'">Votar em ${j.nome}</button>`).join('');
        });

        socket.on('resultadoFinal', (msg) => {
            mostrarTela('tela-fim');
            document.getElementById('msg-final').innerText = msg;
        });

        socket.on('erro', m => { alert(m); location.reload(); });
        socket.on('disconnect', () => { console.log("Caiu a conexão"); });
    </script>
</body>

</html>
